services:
  # ==========================================
  # MYSQL DATABASE SERVICE
  # ==========================================
  mysql:
    # Use official MySQL image
    image: mysql:8.0
    container_name: dhaka-bus-mysql
    
    # Environment variables for MySQL
    environment:
      MYSQL_ROOT_PASSWORD: password # Root password
      MYSQL_DATABASE: dhaka_bus # Create this database automatically
      MYSQL_ROOT_HOST: '%' # Allow connections from any host
      TZ: 'UTC' #Set timezone
    
    # Port mapping: host_port:container_port
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    
    # Volumes for data persistence
    # This means database data is saved even if container is deleted
    volumes:
      # Mount SQL files to auto-run on startup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      # Named volume for persistent data
      - mysql_data:/var/lib/mysql
    
    # Health check - tells Docker when container is ready
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    
    networks:
      - dhaka-network

  # ==========================================
  # BACKEND SERVICE (Node.js + Express)
  # ==========================================
  backend:
    # Build from backend Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dhaka-bus-backend
    
    # Restart policy - restart if container crashes
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "3000:3000"
    
    # Environment variables
    environment:
      PORT: 3000
      DB_HOST: mysql # Service name in this compose file
      DB_USER: ${DB_USER:-dhaka_runtime_rw}
      DB_PASSWORD: ${DB_PASSWORD:-dhaka_runtime_rw_pass_2026}
      DB_NAME: dhaka_bus
      FRONTEND_URL: http://localhost
      # Optional SMTP settings for verification emails
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-srabonahmed2002@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-Dhaka Bus <srabonahmed2002@gmail.com>}
      # Payment gateway settings (Stripe)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-bdt}
      PAYMENT_SUCCESS_URL: ${PAYMENT_SUCCESS_URL:-http://localhost/booking?payment=success&session_id={CHECKOUT_SESSION_ID}}
      PAYMENT_CANCEL_URL: ${PAYMENT_CANCEL_URL:-http://localhost/booking?payment=cancelled}
      # Payment Mode (manual-both, manual-bkash, manual-nagad, nagad)
      PAYMENT_MODE: ${PAYMENT_MODE:-manual-both}
      # Manual Payment - bKash Personal Account
      BKASH_PERSONAL_NUMBER: ${BKASH_PERSONAL_NUMBER:-}
      BKASH_PERSONAL_NAME: ${BKASH_PERSONAL_NAME:-}
      # Manual Payment - Nagad Personal Account
      NAGAD_PERSONAL_NUMBER: ${NAGAD_PERSONAL_NUMBER:-}
      NAGAD_PERSONAL_NAME: ${NAGAD_PERSONAL_NAME:-}
      # Nagad Merchant Configuration (for future use)
      NAGAD_MERCHANT_ID: ${NAGAD_MERCHANT_ID:-}
      NAGAD_MERCHANT_KEY: ${NAGAD_MERCHANT_KEY:-}
      NAGAD_MERCHANT_PHONE: ${NAGAD_MERCHANT_PHONE:-}
      NAGAD_API_URL: ${NAGAD_API_URL:-https://api.nagadpay.com/api/dfs/check-out}
      NAGAD_CALLBACK_URL: ${NAGAD_CALLBACK_URL:-http://localhost/api/tickets/payment/nagad/callback}
      PAYMENT_CURRENCY: ${PAYMENT_CURRENCY:-bdt}
    
    # Volumes - map local files to container
    volumes:
      # Map backend source code (for development with nodemon)
      - ./backend:/app
      # Don't map node_modules (use container's version)
      - /app/node_modules
    
    # Wait for MySQL before starting backend
    depends_on:
      mysql:
        condition: service_healthy
    
    networks:
      - dhaka-network

  # ==========================================
  # FRONTEND SERVICE (React + Vite + Nginx)
  # ==========================================
  frontend:
    # Build from frontend Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dhaka-bus-frontend
    
    # Restart policy
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "80:80"
    
    # Environment variables
    environment:
      VITE_API_URL: http://localhost:3000
    
    # Depends on backend being ready
    depends_on:
      - backend
    
    networks:
      - dhaka-network

  # ==========================================
  # PHPMYADMIN (Admin UI for MySQL)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dhaka-bus-phpmyadmin
    restart: unless-stopped
    # Use platform emulation on Apple Silicon if necessary
    platform: linux/amd64
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - dhaka-network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  # Named volume for MySQL data
  # This persists database data even when container is removed
  mysql_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  # Network allows containers to communicate by service name
  dhaka-network:
    driver: bridge
