# Nginx configuration for React Single Page Application
# This serves the React app and handles routing

server {
    listen 80;
    server_name localhost;

    # Root directory where React files are served from
    root /usr/share/nginx/html;
    index index.html;

    # Try to serve requested file, if not found serve index.html
    # This is needed for React Router to work (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS) - they change with filename
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML - always check for updates
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API requests to backend
    # Any request to /api goes to backend container
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
